services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sidpol-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      #DB_HOST: "192.168.1.52"
      DB_HOST: "host.docker.internal"
      DB_PORT: "3306"
      DB_NAME: sidpol_db
      DB_USER: sidpol_user
      DB_PASS: Sidpol123!
      JWT_SECRET: 8G6vQq6d2z0wLqk3yZ9mN6Xc7hF1Vj5sR4pT2uE9cA1bK0nM3xZ7qW5yY2pJ9rQ
      SEED_USERS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build: ./frontend
    container_name: sidpol-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    #  - VITE_API_URL=http://TU_IP_DE_VM2:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    depends_on:
      - backend