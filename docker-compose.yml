services:
  mysql:
    image: mysql:8.0
    container_name: sidpol-mysql
    environment:
      MYSQL_DATABASE: sidpol_db
      MYSQL_USER: sidpol_user
      MYSQL_PASSWORD: Sidpol123!
      MYSQL_ROOT_PASSWORD: Root123!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sidpol-backend
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: sidpol_db
      DB_USER: sidpol_user
      DB_PASS: Sidpol123!
      JWT_SECRET: 8G6vQq6d2z0wLqk3yZ9mN6Xc7hF1Vj5sR4pT2uE9cA1bK0nM3xZ7qW5yY2pJ9rQ
      SEED_USERS: "true"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
        


  frontend:
    build: ./frontend
    container_name: sidpol-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data:
