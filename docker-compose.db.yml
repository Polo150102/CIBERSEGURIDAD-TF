services:
  mysql:
    image: mysql:8.0
    container_name: sidpol-mysql
    environment:
      MYSQL_DATABASE: sidpol_db
      MYSQL_USER: sidpol_user
      MYSQL_PASSWORD: Sidpol123!
      MYSQL_ROOT_PASSWORD: Root123!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

volumes:
  mysql_data: